inferenceExtension:
  replicas: 1
  image:
    registry: ghcr.io/llm-d
    repository: llm-d-inference-scheduler-dev
    tag: main
    pullPolicy: Always
  extProcPort: 9002
  env: []
  pluginsConfigFile: "default-plugins.yaml"

  # Define additional container ports.
  extraContainerPorts: []

  # Define additional service ports.
  extraServicePorts: []

  affinity: {}

  tolerations: []

  # Resource requests and limits for the EPP container.
  # These defaults are sized for a standard EPP deployment with built-in
  # scheduling plugins. CPU limits are intentionally unset to allow bursting
  # to all available node CPUs during scheduling spikes. Memory limit is set
  # to 16Gi to avoid putting the node under memory pressure in case of a
  # memory leak.
  #
  # These values were validated with scale testing at high QPS, achieving
  # p90 scheduler latency within 100ms.
  #
  # If you add computationally intensive plugins or sidecars (e.g., latency
  # prediction, custom scorers), you may need to increase these values.
  # Use pprof (https://pkg.go.dev/net/http/pprof) to profile your deployment
  # and right-size resources for your workload.
  resources:
    requests:
      cpu: "4"
      memory: 8Gi
    limits:
      memory: 16Gi

  # Sidecar configuration for EPP.
  sidecar:
    enabled: false

  # Monitoring configuration for EPP.
  monitoring:
    interval: "10s"
    # Prometheus ServiceMonitor will be created when enabled for EPP metrics collection.
    prometheus:
      enabled: false
      auth:
        enabled: true
        # Service account token secret for authentication.
        secretName: inference-gateway-sa-metrics-reader-secret
      # Additional labels for the ServiceMonitor.
      extraLabels: {}

  tracing:
    enabled: false
    otelExporterEndpoint: "http://localhost:4317"
    sampling:
      sampler: "parentbased_traceidratio"
      samplerArg: "0.1"

  # Metrics DataSource Configuration.
  # These values configure how the EPP scrapes metrics from model server pods.
  metricsDataSource:
    scheme: "http"
    path: "/metrics"
    insecureSkipVerify: true

  latencyPredictor:
    enabled: false
    # Training Server Configuration
    trainingServer:
      image:
        # TODO: Update this default once llm-d owns and publishes this image.
        registry: us-central1-docker.pkg.dev/k8s-staging-images
        repository: gateway-api-inference-extension/latency-training-server
        tag: main
        pullPolicy: Always
      port: 8000
      resources:
        requests:
          cpu: "2000m"
          memory: "4Gi"
        limits:
          cpu: "4000m"
          memory: "8Gi"
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8000
        initialDelaySeconds: 30
        periodSeconds: 20
      readinessProbe:
        httpGet:
          path: /readyz
          port: 8000
        initialDelaySeconds: 45
        periodSeconds: 10
      volumeSize: "20Gi"
      config:
        LATENCY_RETRAINING_INTERVAL_SEC: "10"
        LATENCY_MIN_SAMPLES_FOR_RETRAIN: "100"
        LATENCY_TTFT_MODEL_PATH: "/models/ttft.joblib"
        LATENCY_TPOT_MODEL_PATH: "/models/tpot.joblib"
        LATENCY_TTFT_SCALER_PATH: "/models/ttft_scaler.joblib"
        LATENCY_TPOT_SCALER_PATH: "/models/tpot_scaler.joblib"
        LATENCY_MODEL_TYPE: "xgboost"
        LATENCY_MAX_TRAINING_DATA_SIZE_PER_BUCKET: "500"
        LATENCY_OBJECTIVE_TYPE: "mean"

    # Prediction Server Configuration
    predictionServers:
      count: 1
      startPort: 8001
      image:
        # TODO: Update this default once llm-d owns and publishes this image.
        registry: us-central1-docker.pkg.dev/k8s-staging-images
        repository: gateway-api-inference-extension/latency-prediction-server
        tag: main
        pullPolicy: Always
      resources:
        requests:
          cpu: "8000m"
          memory: "4Gi"
        limits:
          cpu: "28000m"
          memory: "8Gi"
      livenessProbe:
        httpGet:
          path: /healthz
        initialDelaySeconds: 15
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 5
      readinessProbe:
        httpGet:
          path: /readyz
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 30
      volumeSize: "10Gi"
      config:
        LATENCY_MODEL_TYPE: "xgboost"
        PREDICT_HOST: "0.0.0.0"
        LOCAL_TTFT_MODEL_PATH: "/server_models/ttft.joblib"
        LOCAL_TPOT_MODEL_PATH: "/server_models/tpot.joblib"
        LOCAL_TTFT_SCALER_PATH: "/server_models/ttft_scaler.joblib"
        LOCAL_TPOT_SCALER_PATH: "/server_models/tpot_scaler.joblib"
        UVICORN_WORKERS: "28"
        OMP_NUM_THREADS: "1"
        MODEL_SYNC_INTERVAL_SEC: "30"
        LATENCY_OBJECTIVE_TYPE: "mean"

    # EPP Environment Variables for Latency Predictor
    eppEnv:
      LATENCY_MAX_SAMPLE_SIZE: "10000"
      LATENCY_MAX_CONCURRENT_DISPATCHES: "36"
      LATENCY_COALESCE_WINDOW_MS: "1"
